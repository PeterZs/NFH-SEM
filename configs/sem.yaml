name: ${dataset.scene}
tag: ""
seed: 42

dataset:
  name: sem
  scene: ???
  root_dir: ./load/${dataset.scene}
  real_img_wh:
    - 1024
    - 768
  train_split: "train"
  val_split: "val"
  test_split: "test"
  Q1: -65
  Q2: 205
  Q3: 115
  Q4: 25
  is_3Q_BSE: false
  use_virtual: false
  virtual_depth_confidence_scale: 1.0
  mask_invalid_depth: false

model:
  name: neus
  radius: 14.0
  num_samples_per_ray: 1024
  train_num_rays: 256
  max_train_num_rays: 8192
  grid_prune: true
  grid_prune_occ_thre: 0.001
  dynamic_ray_sampling: true
  batch_image_sampling: true
  randomized: true
  ray_chunk: 4096
  cos_anneal_end: 20000
  learned_background: false
  background_color: random
  bsd:
    warmup_steps: 1000
    c_init: 0.5 
    d_init: 0.0
    e_init: 0.0
  variance:
    init_val: 0.3
    modulate: false
  geometry:
    name: volume-sdf
    radius: 5.0
    feature_dim: 13
    grad_type: analytic
    isosurface:
      method: mc
      resolution: 512
      chunk: 2097152
      threshold: 0.
    xyz_encoding_config:
      otype: HashGrid
      n_levels: 16
      n_features_per_level: 2
      log2_hashmap_size: 19
      base_resolution: 32
      per_level_scale: 1.3195079107728942
      include_xyz: true
    mlp_network_config:
      otype: VanillaMLP
      activation: ReLU
      output_activation: none
      n_neurons: 64
      n_hidden_layers: 1
      sphere_init: true
      sphere_init_radius: 0.5
      weight_norm: true
  texture:
    name: volume-radiance
    input_feature_dim: ${add:${model.geometry.feature_dim},3} # surface normal as additional input
    dir_encoding_config:
      otype: SphericalHarmonics
      degree: 4
    mlp_network_config:
      otype: FullyFusedMLP
      activation: ReLU
      output_activation: none
      n_neurons: 64
      n_hidden_layers: 2
    color_activation: sigmoid

system:
  name: neus-system
  loss:
    lambda_normal: 1.0 
    lambda_depth_mse: 0.5 
    lambda_mask: 0.0 
    lambda_eikonal: 0.1
    lambda_curvature: 0.
    lambda_sparsity: 0.08 
    lambda_distortion: 0.
    lambda_opaque: 0.
    lambda_use_bsd_reg: true 
    lambda_reg: 1.0 
    sparsity_scale: 1.
    normal_lr: 0.01
    use_depth_confidence: true 
    consider_gray_scale: false
    bsd_mask_type: Adaptive 
    adaptive_mask_threshold: 0.25
    adaptive_start_step: 2000 
    virtual_close_step: 10000 
  optimizer:
    name: AdamW
    args:
      lr: 0.01
      betas: [0.9, 0.99]
      eps: 1.e-15
    params:
      geometry:
        lr: 0.01
      variance:
        lr: 0.001
      bsd_network:
       lr: 0.0 
  warmup_steps: 500
  scheduler:
    name: SequentialLR
    interval: step
    milestones:
      - ${system.warmup_steps}
    schedulers:
      - name: LinearLR 
        args:
          start_factor: 0.01
          end_factor: 1.0
          total_iters: ${system.warmup_steps}
      - name: ExponentialLR
        args:
          gamma: ${calc_exp_lr_decay_rate:0.1,${sub:${trainer.max_steps},${system.warmup_steps}}}

checkpoint:
  save_top_k: -1
  every_n_train_steps: 10000 

export:
  chunk_size: 2097152
  export_vertex_color: True

trainer:
  max_steps: 3000 
  log_every_n_steps: 10
  num_sanity_val_steps: 0
  val_check_interval: 10000
  limit_train_batches: 1.0
  limit_val_batches: 2
  enable_progress_bar: true
  precision: 16
